@if (showLayout) {
  <div class="layout">
    <aside class="sidebar">
      <h2>InterviewTracker</h2>

      <nav>
        <a routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
        <a routerLink="/interviews" routerLinkActive="active">Interviews</a>
        <a routerLink="/companies" routerLinkActive="active">Companies</a>
        <a routerLink="/recruiters" routerLinkActive="active">Recruiters</a>
      </nav>

      <button type="button" (click)="logout()">Logout</button>
    </aside>

    <main class="content">
      <router-outlet></router-outlet>
    </main>
  </div>
} @else {
  <router-outlet></router-outlet>
}
